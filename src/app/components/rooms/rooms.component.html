<!-- Section Start -->
<section class="section">
    <!-- Title -->
    <h1 class="section-subtitle">Our Rooms</h1>

      <!-- Breadcrumb -->
      <nav class="breadcrumb">
        <ul>
            <li><a [routerLink]="['/index']">Home</a></li>
            <li>View Rooms</li>
        </ul>
    </nav>

    <!-- Search and Filter -->
    <div class="search-filter">
         <!-- Search Bar -->
        <div class="search-bar">
            <input id="search" [(ngModel)]="search" (input)="onSearch()" [ngModelOptions]="{standalone: true}" type="text" class="search-input" placeholder="Search by Room Type, Price or Capacity...." />
        </div>

        <!-- Filter Dropdown -->
        <div class=".filter-dropdown ">
            <select class="filter-select">
                <option value="" disabled selected>Filter By</option>
                <option value="">Price: Low to High</option>
                <option value="">Price: High to Low</option>
                <option value="">Capacity</option>
                <option value="">Type</option>
            </select>
        </div>
    </div> 

      <!-- Rooms Cards -->
    <div class="rooms-cards">

        <div class="card" *ngFor="let room of (rooms | slice : lowIndex : highIndex)">
            <img [src]="room.roomImage" alt="Luxury Room" class="card-image">
            <div class="card-content">
                <div class="card-header">
                    <h2 class="room-title">{{room.roomType}}</h2>
                    <h3 class="room-price">${{room.price}}<span class="price-unit">/Pernight</span></h3>
                </div>
                <div class="room-details">
                    <li><strong>Size:</strong>{{room.size}}ft<sup>2</sup></li>
                    <li><strong>Capacity:</strong>Max person {{room.capacity}}</li>
                    <li><strong>Bed:</strong>{{room.bedType}}</li>
                    <li><strong>Services:</strong>{{room.services}}</li>
                </div>
                <div class="card-actions">
                    <button class="btn-primary" (click)="goToRoomDetails(room.id)">View More</button>
                    <button class="btn-secondary" *ngIf="isLoggedIn" (click)="goToBookRoom()">Book Now</button>
                </div>
            </div>
        </div>
    </div>
    <!-- End of Rooms Card -->

    <!-- Paginator -->
    <mat-paginator [length]= items [pageSize]="6" [showFirstLastButtons]="true" [pageIndex]="currentpage" [pageSizeOptions]="[6, 9, 12, 15, 18, 21]" (page)="handlePagenator($event)" aria-label="Select page">
    </mat-paginator>
    <!-- End of Paginator -->
</section>
<!-- End Of Section -->
